fallback-auth-server: 
  description: |
    当未安装 limboapi 时，HyperZoneLogin用于认证等待区的后端服务器ID。留空表示禁用。
  default: "lobby"
post-auth-default-server:
  description: |
    登入完成后优先进入的子服务器ID；若为空或找不到该服务器，则继续按其他候选顺序选择。
  default: "play"
remember-requested-server-during-auth:
  description: |
    在认证过程中记住玩家请求进入的服务器ID，并在认证完成后优先尝试进入该服务器。
  default: true